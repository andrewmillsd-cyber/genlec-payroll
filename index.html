<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#6366f1"/>
<title>Vakasha Lodge Wages</title>
<link rel="manifest" id="pwa-manifest"/>
<link rel="apple-touch-icon" id="pwa-icon"/>
<link rel="icon" id="pwa-favicon"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:#f8fafc;font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#334155;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
input,select,textarea,button{font-family:inherit;}
#app{max-width:1200px;margin:0 auto;padding:20px 16px;}
.app-header{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:10px 20px;margin-bottom:24px;border:1px solid #e2e8f0;gap:12px;flex-wrap:wrap;box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.07);}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-wrap img{height:32px;width:auto;max-width:160px;}
.app-title{font-size:14px;font-weight:700;color:#111;}
.app-subtitle{font-size:11px;color:#9ca3af;margin-top:1px;}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
#sync-badge{font-size:11px;color:#059669;font-weight:600;min-width:44px;}
.month-sel-wrap{display:flex;align-items:center;gap:6px;background:#f9fafb;border:1px solid #eaecf0;border-radius:8px;padding:5px 10px;}
.month-sel-wrap select{border:none;background:transparent;font-size:13px;font-weight:600;color:#111;cursor:pointer;outline:none;}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.metric{background:#fff;border-radius:12px;padding:20px 22px;border:1px solid #e2e8f0;box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.07);}
.ml{font-size:0.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}
.mv{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#0f172a;}
.mv.green{color:#16a34a;}
.mv-sub{font-size:12px;color:#94a3b8;margin-top:5px;}
.months-bar{display:flex;gap:3px;margin-top:10px;}
.month-pip{flex:1;height:4px;border-radius:2px;background:#e5e7eb;}
.month-pip.done{background:#059669;}
.section-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:16px;overflow:hidden;box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.07);}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #e2e8f0;}
.section-title{font-size:13px;font-weight:700;color:#0f172a;display:flex;align-items:center;gap:8px;}
.ptable{width:100%;border-collapse:separate;border-spacing:0;background:#ffffff;border-radius:12px;box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);overflow:hidden;}
.ptable th{background-color:#f1f5f9;padding:16px;text-align:left;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;font-weight:600;position:sticky;top:0;z-index:10;}
.ptable td{padding:14px 16px;border-bottom:1px solid #e2e8f0;font-size:13px;vertical-align:middle;color:#334155;}
.ptable tr:last-child td{border-bottom:none;}
.ptable tr:hover td{background:#f8fafc;}
.ptable .total-row td{font-weight:700;background:#f1f5f9;border-top:2px solid #e2e8f0;}
.payroll-table{width:100%;border-collapse:separate;border-spacing:0;background:#ffffff;border-radius:12px;box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);overflow:hidden;}
.payout-val{font-size:13px;font-weight:700;color:#059669;}
.muted-val{color:#d1d5db;}
.denom-val-cell{text-align:center;font-size:12px;font-weight:600;color:#111;}
.denom-val-cell.zero{color:#d1d5db;font-weight:400;}
.denom-header{text-align:center;font-size:10px;}
.employee-name{font-weight:600;color:#111;}
.emp-num{font-size:11px;color:#9ca3af;margin-top:1px;}
.emp-cell{display:flex;align-items:center;gap:10px;}
.av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.av-blue{background:#dbeafe;color:#1d4ed8;}.av-teal{background:#d1fae5;color:#065f46;}.av-coral{background:#fee2e2;color:#b91c1c;}.av-purple{background:#ede9fe;color:#6d28d9;}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#334155;transition:all 0.2s;}
.btn:hover{background:#f1f5f9;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.btn:active{transform:translateY(0);}
.btn-navy{background:#1e293b;color:#fff;border-color:#1e293b;}
.btn-navy:hover{background:#0f172a;box-shadow:0 4px 12px rgba(30,41,59,0.25);}
.btn-green{background:#2563eb;color:#fff;border-color:#2563eb;}
.btn-green:hover{background:#1d4ed8;box-shadow:0 4px 12px rgba(37,99,235,0.25);}
.btn-red{background:#fff;color:#dc2626;border-color:#fecaca;}
.btn-red:hover{background:#fef2f2;}
.btn-amber{background:#fffbeb;color:#d97706;border-color:#fde68a;}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px;}
.btn-icon{width:30px;height:30px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.btn-primary{background:#2563eb;color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;transition:all 0.2s;border:none;cursor:pointer;}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,0.2);}
.badge{font-size:11px;padding:4px 12px;border-radius:9999px;display:inline-block;font-weight:500;}
.b-paid{background:#dcfce7;color:#166534;}
.badge-paid{background:#dcfce7;color:#166534;padding:4px 12px;border-radius:9999px;font-size:0.75rem;font-weight:500;}
.b-locked{background:#dcfce7;color:#166534;font-size:10px;padding:2px 6px;border-radius:9999px;}
.vb{background:#dbeafe;color:#1d4ed8;font-size:10px;padding:2px 6px;border-radius:9999px;}
.reset-badge{background:#fef9c3;color:#854d0e;font-size:10px;padding:2px 6px;border-radius:9999px;font-weight:600;}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;background:#fff;padding:5px;border-radius:10px;border:1px solid #e2e8f0;box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.05);}
.tab{padding:7px 16px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#64748b;transition:all 0.2s;}
.tab.active{background:#2563eb;color:#fff;box-shadow:0 2px 8px rgba(37,99,235,0.25);}
.tab:hover:not(.active){background:#f1f5f9;color:#334155;}
.mw{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,0.5);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;z-index:100;overflow-y:auto;}
.mo{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:440px;margin:auto;border:1px solid #e2e8f0;box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.1),0 8px 10px -6px rgb(0 0 0 / 0.1);}
.mo h2{font-size:16px;font-weight:700;margin-bottom:16px;color:#111;}
.fr{margin-bottom:12px;}
.fr label{font-size:11px;font-weight:700;color:#6b7280;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#111;font-size:13px;}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:#059669;}
.fr .hint{font-size:11px;color:#9ca3af;margin-top:3px;}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.bs{padding:9px 20px;border-radius:8px;border:none;background:#111827;color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
.bc{padding:9px 20px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#6b7280;font-size:13px;font-weight:600;cursor:pointer;}
.lock-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 20px;background:#f5f6fa;}
.lock-logo img{height:56px;width:auto;max-width:260px;}
.lock-title{font-size:20px;font-weight:800;color:#111;margin-top:4px;}
.lock-sub{font-size:13px;color:#6b7280;text-align:center;}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid #d1d5db;background:transparent;}
.pin-dot.filled{background:#111827;border-color:#111827;}
.pin-pad{display:grid;grid-template-columns:repeat(3,66px);gap:10px;}
.pin-btn{width:66px;height:66px;border-radius:50%;border:1px solid #e5e7eb;background:#fff;font-size:20px;font-weight:700;cursor:pointer;color:#111;}
.pin-btn:hover{background:#f9fafb;}
.pin-err{font-size:13px;color:#dc2626;font-weight:600;}
.ytdt{width:100%;border-collapse:collapse;font-size:12px;}
.ytdt th{text-align:left;padding:8px 12px;border-bottom:1px solid #f3f4f6;color:#9ca3af;font-weight:700;font-size:10px;text-transform:uppercase;}
.ytdt td{padding:8px 12px;border-bottom:1px solid #f9fafb;}
.ar{padding:10px 0;border-bottom:1px solid #f9fafb;font-size:12px;}
.at{color:#9ca3af;font-size:11px;margin-top:2px;}
.hbanner{background:#fffbeb;border-radius:8px;padding:8px 14px;margin-bottom:14px;font-size:12px;color:#d97706;border:1px solid #fde68a;}
.hchip{display:inline-flex;background:#fef3c7;color:#92400e;font-size:11px;padding:2px 8px;border-radius:6px;margin:2px;font-weight:600;}
.swarn{background:#fffbeb;border-radius:8px;padding:7px 12px;margin-bottom:12px;font-size:12px;color:#d97706;border:1px solid #fde68a;}
.eg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:10px;}
.estat{background:#f9fafb;border-radius:8px;padding:8px 10px;border:1px solid #f3f4f6;}
.esl{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px;}
.esv{font-size:14px;font-weight:700;}
.lb{background:#e5e7eb;border-radius:3px;height:5px;margin:6px 0;}
.lf{background:#059669;border-radius:3px;height:5px;}
.ns{margin-top:10px;padding-top:10px;border-top:1px solid #f3f4f6;}
.nh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.ne{background:#f9fafb;border-radius:8px;padding:7px 10px;margin-bottom:5px;}
.nt{font-size:12px;line-height:1.5;margin-bottom:2px;}
.nm{font-size:11px;color:#9ca3af;display:flex;justify-content:space-between;}
.ndel{font-size:11px;color:#dc2626;cursor:pointer;border:none;background:transparent;padding:0;font-weight:600;}
.nir{display:flex;gap:6px;align-items:flex-start;margin-top:6px;}
.nta{flex:1;padding:7px 10px;border-radius:8px;border:1px solid #e5e7eb;font-size:12px;resize:none;line-height:1.5;}
.nab{padding:7px 12px;border-radius:8px;border:none;background:#111827;color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
.tl{font-size:12px;color:#6b7280;cursor:pointer;font-weight:600;}
@media print{.mw,.tabs,.header-actions{display:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:640px){#app{padding:10px;}.ptable th,.ptable td{padding:8px 8px;font-size:11px;}}

/* Mobile layout */
.mobile-app { display: none; }
@media (max-width: 767px) {
  .desktop-app { display: none !important; }
  .mobile-app { display: block; }
  body { background: #f8fafc; }
}
@media (min-width: 768px) {
  .mobile-app { display: none !important; }
  .desktop-app { display: block; }
}

/* Mobile specific styles */
.mobile-wrap { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }
.m-header { background: #fff; padding: 20px 20px 16px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 30; }
.m-hero { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); border-radius: 24px; padding: 24px; color: #fff; margin: 0 16px 20px; position: relative; overflow: hidden; box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
.m-hero h2 { font-size: clamp(24px, 8vw, 36px); font-weight: 800; margin: 8px 0 16px; letter-spacing: -1px; }
.m-hero p { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.75; }
.m-hero-blob1 { position: absolute; width: 160px; height: 160px; background: rgba(255,255,255,0.08); border-radius: 50%; right: -40px; top: -40px; }
.m-hero-blob2 { position: absolute; width: 160px; height: 160px; background: rgba(99,102,241,0.15); border-radius: 50%; left: -40px; bottom: -40px; }
.m-chip { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 600; display: inline-block; margin-right: 8px; backdrop-filter: blur(8px); }
.m-chip-amber { background: rgba(251,191,36,0.3); color: #fef3c7; }
.m-section { padding: 0 16px; margin-bottom: 20px; }
.m-section-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 12px; }
.m-card { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.m-card-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
.m-avatar { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.m-emp-name { font-size: 14px; font-weight: 700; color: #0f172a; }
.m-emp-sub { font-size: 11px; color: #94a3b8; margin-top: 1px; }
.m-payout { font-size: 16px; font-weight: 800; color: #6366f1; }
.m-status-paid { background: #dcfce7; color: #166534; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 9999px; }
.m-status-pending { background: #fef9c3; color: #854d0e; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 9999px; }
.m-deductions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 14px; border-top: 1px solid #f1f5f9; margin-top: 4px; }
.m-deduct-item { background: #f8fafc; border-radius: 10px; padding: 8px; text-align: center; }
.m-deduct-label { font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
.m-deduct-val { font-size: 13px; font-weight: 700; color: #334155; margin-top: 2px; }
.m-deduct-val.red { color: #dc2626; }
.m-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; margin-bottom: 20px; }
.m-action-btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all 0.15s; }
.m-action-btn:active { transform: scale(0.97); background: #f8fafc; }
.m-action-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.m-action-label { font-size: 12px; font-weight: 600; color: #334155; }
.m-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; margin-bottom: 20px; }
.m-stat-card { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.m-stat-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.m-stat-val { font-size: 20px; font-weight: 800; color: #0f172a; }
.m-stat-val.green { color: #16a34a; }
.m-stat-sub { font-size: 11px; color: #94a3b8; margin-top: 4px; }
.m-pips { display: flex; gap: 3px; margin-top: 8px; }
.m-pip { flex: 1; height: 4px; border-radius: 2px; background: #e2e8f0; }
.m-pip.done { background: #6366f1; }

/* Bottom nav */
.m-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 430px; margin: 0 auto; background: rgba(255,255,255,0.92); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #e2e8f0; padding: 8px 20px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 40; }
.m-nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; color: #94a3b8; padding: 4px 8px; transition: color 0.15s; }
.m-nav-btn.active { color: #6366f1; }
.m-nav-btn svg { width: 24px; height: 24px; }
.m-nav-btn span { font-size: 10px; font-weight: 700; }
.m-nav-fab { width: 52px; height: 52px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 18px; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 16px rgba(99,102,241,0.4); margin-top: -20px; transition: transform 0.15s; }
.m-nav-fab:active { transform: scale(0.94); }

/* Mobile modal */
.m-modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,0.55); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.m-modal { background: #fff; border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; will-change: transform; }
.m-modal-handle { width: 40px; height: 4px; cursor: grab; background: #e2e8f0; border-radius: 2px; margin: 0 auto 16px; }
.m-modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 16px; color: #0f172a; }
.m-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; color: #0f172a; font-size: 14px; margin-top: 4px; outline: none; font-family: inherit; }
.m-input:focus { border-color: #6366f1; background: #fff; }
.m-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 12px; display: block; }
.m-btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #a855f7); color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; font-family: inherit; }
.m-btn-primary:active { opacity: 0.9; transform: scale(0.99); }
.m-btn-cancel { width: 100%; padding: 14px; background: #f1f5f9; color: #64748b; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: inherit; }

/* Log items */
.m-log-item { background: #fff; border: 1px solid #f1f5f9; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.m-log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.m-log-msg { font-size: 13px; font-weight: 500; color: #334155; }
.m-log-ts { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-top: 2px; }

/* Mobile PIN */
.m-pin-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 32px 20px; background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 100%); }
.m-pin-logo img { height: 52px; width: auto; max-width: 240px; }
.m-pin-title { font-size: 22px; font-weight: 800; color: #0f172a; }
.m-pin-sub { font-size: 13px; color: #64748b; text-align: center; }
.m-pin-dots { display: flex; gap: 14px; }
.m-pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #c7d2fe; background: transparent; transition: all 0.15s; }
.m-pin-dot.filled { background: #6366f1; border-color: #6366f1; transform: scale(1.1); }
.m-pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
.m-pin-btn { width: 72px; height: 72px; border-radius: 50%; border: 1.5px solid #e2e8f0; background: #fff; font-size: 22px; font-weight: 700; cursor: pointer; color: #0f172a; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.1s; font-family: inherit; }
.m-pin-btn:active { transform: scale(0.94); background: #f1f5f9; }
.m-pin-err { font-size: 13px; color: #ef4444; font-weight: 600; }

/* Fade animation */
@keyframes mFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

function syncToCloud(cb){
  if(!navigator.onLine){syncStatus='offline';renderSyncBadge();if(cb)cb(false);return;}
  syncStatus='saving';renderSyncBadge();
  fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({emps:G.emps,paid:G.paid,log:G.log,mo:G.mo})})
    .then(function(r){return r.text();})
    .then(function(t){syncStatus=t.trim()==='OK'?'saved':'error';renderSyncBadge();if(cb)cb(t.trim()==='OK');})
    .catch(function(){syncStatus='error';renderSyncBadge();if(cb)cb(false);});
}
function loadFromCloud(cb){
  if(!navigator.onLine){if(cb)cb(false);return;}
  syncStatus='loading';renderSyncBadge();
  fetch(SHEETS_URL+'?t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(t){
      if(!t||t==='{}'||t.trim()===''){syncStatus='saved';renderSyncBadge();if(cb)cb(false);return;}
      var d=JSON.parse(t);
      if(d&&d.emps&&d.emps.length){
        G.emps=d.emps;if(d.paid)G.paid=d.paid;if(d.log)G.log=d.log;if(d.mo!==undefined)G.mo=d.mo;
        try{localStorage.setItem(SK,JSON.stringify({emps:G.emps,paid:G.paid,log:G.log,mo:G.mo}));}catch(e){}
        syncStatus='saved';renderSyncBadge();if(cb)cb(true);
      }else{syncStatus='saved';renderSyncBadge();if(cb)cb(false);}
    }).catch(function(){syncStatus='error';renderSyncBadge();if(cb)cb(false);});
}

  el.textContent=map[syncStatus]||'';el.style.color=col[syncStatus]||'';
}
function manualSync(){
  if(!navigator.onLine){syncStatus='offline';renderSyncBadge();alert('Offline. Try again when connected.');return;}

}

/* Column sort state */
var sortCol=null,sortDir=1;
function sortBy(col){
  if(sortCol===col)sortDir*=-1;
  else{sortCol=col;sortDir=1;}
  render();
}
function getSortedEmps(){
  var emps=G.emps.slice();
  if(!sortCol)return emps;
  emps.sort(function(a,b){
    var av,bv;
    if(sortCol==='name'){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
    else if(sortCol==='payout'){av=po(a,G.mo);bv=po(b,G.mo);}
    else if(sortCol==='salary'){av=es(a,G.mo);bv=es(b,G.mo);}
    if(av<bv)return -1*sortDir;
    if(av>bv)return 1*sortDir;
    return 0;
  });
  return emps;
}

function exportBackup(){
  var data={
    version:1,
    exported:nowTs(),
    emps:G.emps,
    paid:G.paid,
    log:G.log,
    mo:G.mo
  };
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var date=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download='genlec-payroll-backup-'+date+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  G.log.push({ts:nowTs(),msg:'Data backup exported.'});
  saveS();
}

function importBackup(){
  var input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.emps||!Array.isArray(data.emps)){
          alert('Invalid backup file.');return;
        }
        if(!confirm('Replace ALL current data with this backup from '+(data.exported||'unknown date')+'? This cannot be undone.')){return;}
        G.emps=data.emps;
        G.paid=data.paid||{};
        G.log=data.log||[];
        G.mo=data.mo!==undefined?data.mo:G.mo;
        G.log.push({ts:nowTs(),msg:'Data restored from backup ('+( data.exported||'unknown')+').'});
        saveS();
        syncToCloud();
        render();
        alert('Backup restored successfully.');
      }catch(err){
        alert('Failed to read backup file: '+err.message);
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fE(n){return'E'+parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function nowTs(){return new Date().toISOString().slice(0,16).replace('T',' ');}
function getAdv(e,m){return e.advPerMonth&&e.advPerMonth[m]!==undefined?e.advPerMonth[m]:0;}
function es(e,m){return e.ov&&e.ov[m]!==undefined?e.ov[m]:e.sal;}
function po(e,m){return Math.max(0,Math.round(((es(e,m))-e.paye-e.enpf-getAdv(e,m))*100)/100);}
function den(amt){
  var r={},rem=Math.max(0,Math.round(amt*100));
  DENOMS.forEach(function(d){var c=Math.floor(rem/Math.round(d*100));r[d]=c;rem-=c*Math.round(d*100);});
  return r;
}
function getPIN(){return localStorage.getItem('genlec_pin')||'1234';}
function lock(){G.authed=false;pinEntry='';pinAttempts=0;render();}
function tryPIN(d){
  if(pinLocked&&Date.now()<pinLockUntil){render();return;}
  if(d==='del'){pinEntry=pinEntry.slice(0,-1);render();return;}
  pinEntry+=d;render();
  if(pinEntry.length===4){
    if(pinEntry===getPIN()){
      G.authed=true;pinEntry='';pinAttempts=0;pinLocked=false;lastActive=Date.now();haptic([30,20,30]);render();
      if(navigator.onLine)loadFromCloud(function(ok){if(ok)render();});
    }else{
      pinAttempts++;
      if(pinAttempts>=3){pinLocked=true;pinLockUntil=Date.now()+300000;pinEntry='';render();}
      else{haptic(100);setTimeout(function(){pinEntry='';render();},600);}
    }
  }
}

  e.name=document.getElementById('fn').value;

    var advVal=parseFloat(document.getElementById('fa').value)||0;
    var advType=document.getElementById('fa-type')?document.getElementById('fa-type').value:'once';
    if(!e.advPerMonth)e.advPerMonth={};
    if(advType==='installment'){
      var inst=parseFloat(document.getElementById('fa-install').value)||0;
      var startMo=parseInt(document.getElementById('fa-startmo').value);
      if(inst<=0||inst>advVal)inst=advVal;
      var months=Math.ceil(advVal/inst);
      var rem=advVal;
      for(var mi=0;mi<months;mi++){
        var mo=(startMo+mi)%12;
        var repay=Math.round(Math.min(inst,rem)*100)/100;
        if(!G.paid['a'+mo]){
          e.advPerMonth[mo]=repay;
        }
        rem=Math.round((rem-repay)*100)/100;
        if(rem<=0)break;
      }
      G.log.push({ts:nowTs(),msg:'Advance installment: '+e.name+' - '+fE(advVal)+' over '+months+' months from '+MONTHS[startMo]});
    }else{
      e.advPerMonth[G.mo]=advVal;

function rPayslipMobile(){
  var e=G.sp===null?null:G.emps.find(function(x){return x.id===G.sp;});
  var emps=e?[e]:G.emps.filter(function(x){return x.active;});
  var LOGO=window.LOGO_DATA||'';
  var h='<div class="m-modal-bg"><div class="m-modal"><div class="m-modal-handle"></div>';
  emps.forEach(function(emp){
    var p=po(emp,G.mo);var d=den(p);var sal=es(emp,G.mo);var adv=getAdv(emp,G.mo);
    h+='<div style="border:1px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:12px;">';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;">';
    if(LOGO)h+='<img src="'+LOGO+'" style="height:28px;width:auto;"/>';
    h+='<div><div style="font-weight:800;font-size:14px;color:#0f172a;">Vakasha Lodge </div><div style="font-size:11px;color:#94a3b8;">Payslip - '+MONTHS[G.mo]+' '+CY+'</div></div></div>';
    h+='<div style="font-weight:700;font-size:15px;color:#0f172a;margin-bottom:10px;">'+esc(emp.name)+'</div>';
    var rows=[['Gross salary',fE(sal),false],['PAYE',fE(emp.paye),true],['ENPF',fE(emp.enpf),true]];
    if(adv>0)rows.push(['Advance',fE(adv),true]);
    rows.forEach(function(r){
      h+='<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;">'
        +'<span style="color:#64748b;">'+r[0]+'</span>'
        +'<span style="font-weight:600;color:'+(r[2]?'#dc2626':'#334155')+';">'+(r[2]?'- ':'')+r[1]+'</span>'
        +'</div>';
    });
    h+='<div style="display:flex;justify-content:space-between;padding:10px 0 4px;border-top:1px solid #f1f5f9;margin-top:6px;">'
      +'<span style="font-weight:800;color:#0f172a;">Net payout</span>'
      +'<span style="font-weight:800;font-size:18px;color:#6366f1;">'+fE(p)+'</span></div>';
    var denomItems=DENOMS.filter(function(dn){return d[dn]>0;});
    if(denomItems.length){
      h+='<div style="margin-top:10px;"><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">Denominations</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px;">';
      denomItems.forEach(function(dn){h+='<span style="background:#f5f3ff;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;color:#6366f1;">'+(dn>=1?'E'+dn:'E'+dn.toFixed(2))+' x '+d[dn]+'</span>';});
      h+='</div></div>';
    }
    h+='</div>';
  });
  h+='<button onclick="window.print()" style="width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;">Print payslip</button>'
    +'<button onclick="G.sp=null;render();" style="width:100%;padding:13px;background:#f1f5f9;color:#64748b;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Close</button>';
  return h+'</div></div>';
}

var resizeTimer=null;
var undoStack=null; /* {action, data, empId, label} */
var undoTimer=null;

function pushUndo(label, restoreFn){
  undoStack={label:label, restore:restoreFn};
  clearTimeout(undoTimer);
  undoTimer=setTimeout(function(){undoStack=null;renderUndoToast();},5000);
  renderUndoToast();
}

function doUndo(){
  if(!undoStack)return;
  undoStack.restore();
  clearTimeout(undoTimer);
  undoStack=null;
  saveS();render();
}

function renderUndoToast(){
  var toast=document.getElementById('undo-toast');
  if(!toast)return;
  if(!undoStack){toast.style.display='none';return;}
  toast.style.display='flex';
  var msg=document.getElementById('undo-msg');
  if(msg)msg.textContent=undoStack.label;
}
/* Pull-to-refresh */
var ptrStart=0,ptrActive=false;

/* Swipe-to-dismiss modals */
var modalSwipeStartY=0,modalSwipeEl=null;
function onModalTouchStart(e){
  modalSwipeStartY=e.touches[0].clientY;
  modalSwipeEl=e.currentTarget;
}
function onModalTouchMove(e){
  if(!modalSwipeEl)return;
  var dy=e.touches[0].clientY-modalSwipeStartY;
  if(dy>0){
    modalSwipeEl.style.transform='translateY('+Math.min(dy*0.4,80)+'px)';
    modalSwipeEl.style.transition='none';
  }
}
function onModalTouchEnd(e){
  if(!modalSwipeEl)return;
  var dy=e.changedTouches[0].clientY-modalSwipeStartY;
  if(dy>80){
    /* Swipe down far enough — dismiss */
    modalSwipeEl.style.transform='translateY(100%)';
    modalSwipeEl.style.transition='transform 0.25s ease';
    setTimeout(function(){closeMod();modalSwipeEl=null;},220);
  }else{
    /* Snap back */
    modalSwipeEl.style.transform='';
    modalSwipeEl.style.transition='transform 0.2s ease';
    setTimeout(function(){if(modalSwipeEl)modalSwipeEl.style.transition='';},200);
    modalSwipeEl=null;
  }
}

/* Swipe-to-edit on mobile cards */
var swipeStartX=0,swipeStartY=0,swipeEmpId=null;
function onCardTouchStart(e,empId){
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
  swipeEmpId=empId;
}
function onCardTouchEnd(e,empId){
  var dx=e.changedTouches[0].clientX-swipeStartX;
  var dy=Math.abs(e.changedTouches[0].clientY-swipeStartY);
  if(dx<-60&&dy<30&&swipeEmpId===empId){
    /* Swipe left detected - open edit */
    haptic(30);
    openEdit(empId);
  }
  swipeEmpId=null;
}
document.addEventListener('touchstart',function(e){
  if(window.scrollY===0&&isMobile())ptrStart=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  if(ptrActive&&isMobile()){
    ptrActive=false;
    var ind=document.getElementById('ptr-indicator');
    if(ind)ind.style.display='none';
    if(G.authed&&navigator.onLine){
      haptic(40);
      loadFromCloud(function(ok){if(ok)render();});
    }
  }
  ptrStart=0;
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(ptrStart>0&&isMobile()&&window.scrollY===0){
    var delta=e.touches[0].clientY-ptrStart;
    if(delta>60){
      ptrActive=true;
      var ind=document.getElementById('ptr-indicator');
      if(ind)ind.style.display='flex';
    }
  }
},{passive:true});

var lastWidth=window.innerWidth;
window.addEventListener('resize',function(){
  var newWidth=window.innerWidth;
  if(newWidth===lastWidth)return; /* height-only change = keyboard open/close, skip */
  lastWidth=newWidth;
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){render();},150);
});

document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();if(G.authed)saveNow();}});
function pushHistory(){try{history.pushState({page:'app'},'','');}catch(e){}}
pushHistory();
window.addEventListener('popstate',function(){
  pushHistory();
  if(G.sp!==null){G.sp=null;render();return;}
  if(G.modal){G.modal=null;render();return;}
  if(!G.authed)return;
  if(G.tab!=='monthly'){G.tab='monthly';render();return;}
  if(confirm('Leave Vakasha Lodge Wages?\\n\\nYour data is saved automatically.'))history.go(-2);
});
window.addEventListener('load',function(){
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
  updateOfflineBanner();
  if(navigator.onLine)loadFromCloud(function(ok){if(ok)render();});
});
window.addEventListener('beforeunload',function(e){e.preventDefault();e.returnValue='';return '';});
render();
