<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:#f0f4f8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;color:#1a1a1a;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
input,select,textarea,button{font-family:inherit;}
#app{max-width:680px;margin:0 auto;padding:16px;}
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:2px solid #1e3a6e;}
.logo-wrap img{height:100px;width:auto;max-width:300px;}
.header-actions{display:flex;gap:8px;}
#install-btn{display:none;padding:6px 11px;border-radius:8px;border:1px solid #6ee7b7;background:#d1fae5;cursor:pointer;font-size:12px;color:#065f46;font-weight:600;}
.tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.tab{padding:6px 11px;border-radius:8px;border:1px solid #d0d8e8;background:#fff;cursor:pointer;font-size:12px;color:#6b7280;}
.tab.active{background:#1e3a6e;color:#fff;border-color:#1e3a6e;}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.metric{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e8edf5;}
.ml{font-size:11px;color:#6b7280;margin-bottom:4px;}
.mv{font-size:19px;font-weight:600;}
.mv.green{color:#0f6e56;}.mv.red{color:#a32d2d;}
.card{background:#fff;border:1px solid #e8edf5;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.eh{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.av-blue{background:#dbeafe;color:#1e3a8a;}.av-teal{background:#d1fae5;color:#065f46;}.av-coral{background:#fee2e2;color:#7f1d1d;}.av-purple{background:#ede9fe;color:#4c1d95;}
.en{font-weight:600;font-size:14px;}.es{font-size:11px;color:#6b7280;}
.eg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:9px;}
.estat{background:#f8f9fa;border-radius:8px;padding:7px 9px;}
.esl{font-size:11px;color:#6b7280;margin-bottom:2px;}.esv{font-size:13px;font-weight:600;}
.pr{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid #e8edf5;margin-bottom:7px;}
.pa{font-size:18px;font-weight:700;color:#0f6e56;}
.br{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.btn{padding:6px 11px;border-radius:8px;border:1px solid #d0d8e8;background:#fff;cursor:pointer;font-size:12px;color:#6b7280;}
.btn:hover{background:#f3f4f6;}
.btn-navy{background:#1e3a6e;color:#fff;border-color:#1e3a6e;}
.btn-green{background:#d1fae5;color:#065f46;border-color:#6ee7b7;}
.btn-red{background:#fee2e2;color:#7f1d1d;border-color:#fca5a5;}
.btn-amber{background:#fef3c7;color:#78350f;border-color:#fcd34d;}
.btn-blue{background:#dbeafe;color:#1e3a8a;border-color:#93c5fd;}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(65px,1fr));gap:4px;margin-top:7px;}
.di{background:#f8f9fa;border-radius:8px;padding:5px 6px;text-align:center;border:1px solid #e8edf5;}
.dc{background:#fef3c7;border-radius:8px;padding:5px 6px;text-align:center;border:1px solid #fcd34d;}
.dv{font-size:10px;color:#6b7280;}.dn{font-size:13px;font-weight:700;color:#065f46;}.da{font-size:13px;font-weight:700;color:#78350f;}
.badge{font-size:11px;padding:2px 7px;border-radius:6px;display:inline-block;}
.b-paid{background:#d1fae5;color:#065f46;}.b-pend{background:#fef3c7;color:#78350f;}.b-off{background:#f3f4f6;color:#374151;}.b-hol{background:#fef3c7;color:#78350f;}
.vb{background:#dbeafe;color:#1e3a8a;font-size:10px;padding:1px 5px;border-radius:4px;}
.tl{font-size:12px;color:#6b7280;cursor:pointer;text-decoration:underline;}
.ns{margin-top:9px;padding-top:9px;border-top:1px solid #e8edf5;}
.nh{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.ne{background:#f8f9fa;border-radius:8px;padding:7px 9px;margin-bottom:5px;border:1px solid #e8edf5;}
.nt{font-size:13px;line-height:1.5;margin-bottom:3px;}.nm{font-size:11px;color:#6b7280;display:flex;align-items:center;justify-content:space-between;}
.ndel{font-size:11px;color:#dc2626;cursor:pointer;border:none;background:transparent;padding:0;}
.nir{display:flex;gap:6px;align-items:flex-start;margin-top:5px;}
.nta{flex:1;padding:6px 9px;border-radius:8px;border:1px solid #d0d8e8;background:#fff;color:#1a1a1a;font-size:12px;resize:none;line-height:1.5;}
.nab{padding:7px 12px;border-radius:8px;border:none;background:#1e3a6e;color:#fff;font-size:12px;cursor:pointer;align-self:flex-end;}
.hbanner{background:#fef3c7;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#78350f;border:1px solid #fcd34d;}
.hchip{display:inline-flex;background:#fde68a;color:#78350f;font-size:11px;padding:2px 8px;border-radius:6px;margin:2px;}
.mw{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;z-index:100;overflow-y:auto;}
.mo{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:420px;margin:auto;}
.mo h2{font-size:17px;font-weight:700;margin-bottom:14px;}
.fr{margin-bottom:10px;}.fr label{font-size:12px;color:#6b7280;display:block;margin-bottom:3px;}
.fr input,.fr select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #d0d8e8;background:#fff;color:#1a1a1a;font-size:13px;}
.fr .hint{font-size:11px;color:#9ca3af;margin-top:3px;}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.bs{padding:8px 16px;border-radius:8px;border:none;background:#1e3a6e;color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
.bc{padding:8px 16px;border-radius:8px;border:1px solid #d0d8e8;background:#fff;color:#6b7280;font-size:13px;cursor:pointer;}
.lock-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:28px 20px;background:linear-gradient(160deg,#f0f4f8 0%,#e8edf5 100%);}
.lock-logo{display:flex;flex-direction:column;align-items:center;gap:10px;}
.lock-logo img{height:140px;width:auto;max-width:320px;filter:drop-shadow(0 6px 20px rgba(30,58,110,0.22));}
.lock-title{font-size:24px;font-weight:700;color:#1e3a6e;letter-spacing:-0.3px;}
.lock-sub{font-size:13px;color:#6b7280;text-align:center;max-width:280px;line-height:1.6;}
.lock-err{font-size:13px;color:#a32d2d;text-align:center;max-width:280px;}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid #1e3a6e;background:transparent;}
.pin-dot.filled{background:#1e3a6e;}
.pin-pad{display:grid;grid-template-columns:repeat(3,60px);gap:9px;}
.pin-btn{width:60px;height:60px;border-radius:50%;border:1px solid #d0d8e8;background:#fff;font-size:19px;font-weight:600;cursor:pointer;color:#1a1a1a;}
.pin-btn:hover{background:#dbeafe;}
.pin-err{font-size:12px;color:#a32d2d;}
.swarn{background:#fef3c7;border-radius:8px;padding:7px 12px;margin-bottom:12px;font-size:12px;color:#78350f;border:1px solid #fcd34d;}
.ytdt{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
.ytdt th{text-align:left;padding:6px 7px;border-bottom:1px solid #e8edf5;color:#6b7280;font-weight:600;}
.ytdt td{padding:6px 7px;border-bottom:1px solid #f3f4f6;}
.ar{padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:12px;}.at{color:#6b7280;font-size:11px;margin-top:2px;}
.lb{background:#e5e7eb;border-radius:4px;height:7px;margin:5px 0;}.lf{background:#0f6e56;border-radius:4px;height:7px;}
.reset-badge{background:#fef3c7;color:#78350f;font-size:10px;padding:1px 5px;border-radius:4px;margin-left:4px;}
@media print{.mw{position:static;background:none;padding:0;}.fa{display:none;}}
@media(max-width:480px){#app{padding:12px;}.eg{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div id="root"></div>
<script>

var LOGO = window.LOGO_DATA || '';
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DENOMS = [200,100,50,20,10,5,2,1,0.50,0.20,0.10];
var SK = 'genlec_payroll_2026';
var ST = 300;
var HOLS = {
  0:[{d:'01 Jan',n:"New Year's Day"}],1:[],2:[],
  3:[{d:'19 Apr',n:"King Mswati III Birthday"},{d:'25 Apr',n:'National Flag Day'}],
  4:[{d:'01 May',n:"Workers' Day"},{d:'22 May',n:'Ascension Day'}],
  5:[],6:[{d:'22 Jul',n:'King Sobhuza II Memorial Day'}],
  7:[],8:[],9:[],10:[],
  11:[{d:'25 Dec',n:'Christmas Day'},{d:'26 Dec',n:'Boxing Day'}]
};

var DEF = [
  {id:1,name:'Uve Dubber',ini:'UD',col:'av-blue',sal:7500,paye:451.67,enpf:0,adv:0,notes:'',active:true,loans:[],wn:[],ov:{}},
  {id:2,name:'Simphiwe Dlamini',ini:'SD',col:'av-teal',sal:2000,paye:0,enpf:215,adv:300,notes:'300 loan NOV 25',active:true,loans:[{id:1,desc:'Loan NOV 25',total:300,paid:0,monthly:300}],wn:[{id:1,mo:1,text:'Loan deduction E300 applied.',ts:'2026-02-28'}],ov:{}},
  {id:3,name:'Mfanzile Mnisi',ini:'MM',col:'av-coral',sal:3000,paye:0,enpf:215,adv:200,notes:'',active:true,loans:[],wn:[],ov:{}}
];

function loadS(){try{var r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveS(){try{localStorage.setItem(SK,JSON.stringify({emps:G.emps,paid:G.paid,log:G.log}));}catch(e){}}

var sv=loadS();
var G={
  authed:false, pinEntry:'', pinErr:'',
  tab:'monthly', mo:new Date().getMonth(),
  emps:sv&&sv.emps?sv.emps:JSON.parse(JSON.stringify(DEF)),
  paid:sv&&sv.paid?sv.paid:{},
  log:sv&&sv.log?sv.log:[
    {ts:'2026-01-31 08:14',msg:'January wages marked as paid — total E11,118.33'},
    {ts:'2026-02-28 09:02',msg:'February wages marked as paid — total E11,118.33'}
  ],
  modal:null, sd:{}, sp:null, sn:{},
  nid:sv&&sv.emps?Math.max.apply(null,sv.emps.map(function(e){return e.id;}))+1:4,
  nnid:100, stimer:ST, sint:null
};

/* ── helpers ── */
function fE(n){return 'E'+(+n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});}
function po(e,m){var o=e.ov&&e.ov[m]!==undefined?e.ov[m]:null;return Math.round(((o!==null?o:e.sal)-e.paye-e.enpf-getAdv(e,m))*100)/100;}
function es(e,m){return e.ov&&e.ov[m]!==undefined?e.ov[m]:e.sal;}

/* advance is stored per-month; base adv is just the default for current month if not overridden */
function getAdv(e,m){
  if(e.advPerMonth&&e.advPerMonth[m]!==undefined) return e.advPerMonth[m];
  /* Only apply base advance to the month it was originally set, not future months */
  return 0;
}
function setAdv(e,m,val){if(!e.advPerMonth)e.advPerMonth={};e.advPerMonth[m]=val;}

function den(amt){var r=Math.round(amt*100),res={};for(var i=0;i<DENOMS.length;i++){var c=Math.round(DENOMS[i]*100),n=Math.floor(r/c);res[DENOMS[i]]=n;r-=n*c;}return res;}
function nowTs(){var n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate())+' '+p2(n.getHours())+':'+p2(n.getMinutes());}
function p2(x){return String(x).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── session ── */
function startSess(){
  clearInterval(G.sint);G.stimer=ST;
  G.sint=setInterval(function(){
    G.stimer--;
    if(G.stimer<=0){clearInterval(G.sint);G.authed=false;render();}
    else if(G.stimer===60||G.stimer===30)render();
  },1000);
}
document.addEventListener('click',function(){if(G.authed)G.stimer=ST;});
document.addEventListener('keydown',function(){if(G.authed)G.stimer=ST;});

/* fingerprint removed — PIN only */

/* ── PIN auth ── */
function pinTap(n){
  if(n==='B'){G.pinEntry=G.pinEntry.slice(0,-1);G.pinErr='';render();return;}
  if(G.pinEntry.length>=4)return;
  G.pinEntry+=String(n);
  if(G.pinEntry.length===4){
    var stored=localStorage.getItem('genlec_pin')||'1234';
    if(G.pinEntry===stored){G.authed=true;G.pinEntry='';G.pinErr='';G.showPin=false;startSess();}
    else{G.pinErr='Incorrect PIN';G.pinEntry='';}
  }
  render();
}
function saveNewPin(){
  var p1=document.getElementById('pn1').value;
  var p2=document.getElementById('pn2').value;
  var pc=document.getElementById('pc').value;
  var stored=localStorage.getItem('genlec_pin')||'1234';
  if(pc!==stored){alert('Current PIN incorrect.');return;}
  if(!/^\d{4}$/.test(p1)){alert('PIN must be 4 digits.');return;}
  if(p1!==p2){alert('PINs do not match.');return;}
  localStorage.setItem('genlec_pin',p1);
  G.log.push({ts:nowTs(),msg:'PIN changed.'});
  G.modal=null;saveS();render();
}

function pinBack(){G.pinEntry=G.pinEntry.slice(0,-1);G.pinErr='';render();}
function goSetMain(){G.modal={t:'set',sub:'main'};render();}
function goSetPin(){G.modal={t:'set',sub:'pin'};render();}

/* ── notes ── */
function addNote(id){
  var ta=document.getElementById('ni'+id);if(!ta)return;
  var t=ta.value.trim();if(!t)return;
  var e=G.emps.find(function(x){return x.id===id;});
  if(!e.wn)e.wn=[];
  e.wn.push({id:G.nnid++,mo:G.mo,text:t,ts:new Date().toISOString().slice(0,10)});
  G.log.push({ts:nowTs(),msg:'Note for '+e.name+' ('+MONTHS[G.mo]+'): '+t.slice(0,50)});
  saveS();render();
}
function delNote(eid,nid){
  var e=G.emps.find(function(x){return x.id===eid;});
  e.wn=e.wn.filter(function(n){return n.id!==nid;});
  saveS();render();
}
function togN(id){G.sn[id]=!G.sn[id];render();}
function togD(id){G.sd[id]=!G.sd[id];render();}
function setTab(t){G.tab=t;render();}
function lock(){clearInterval(G.sint);G.authed=false;G.authErr='';render();}

function markPaid(){
  G.paid['a'+G.mo]=true;
  var tot=G.emps.filter(function(e){return e.active;}).reduce(function(s,e){return s+po(e,G.mo);},0);
  /* Lock current month advance and reset next month advance to 0 for all active employees */
  var nextMo=(G.mo+1)%12;
  G.emps.forEach(function(e){
    if(!e.active)return;
    if(!e.advPerMonth)e.advPerMonth={};
    /* Ensure current month advance is explicitly stored (lock it) */
    if(e.advPerMonth[G.mo]===undefined)e.advPerMonth[G.mo]=0;
    /* Reset next month to 0 unless already set by the user */
    if(e.advPerMonth[nextMo]===undefined)e.advPerMonth[nextMo]=0;
  });
  G.log.push({ts:nowTs(),msg:MONTHS[G.mo]+' wages paid — total '+fE(tot)+'. Advance reset to E0 for '+MONTHS[nextMo]+'.'});
  saveS();render();
}
function updateLoanPreview(){
  var total=parseFloat(document.getElementById('lt')?document.getElementById('lt').value:0)||0;
  var monthly=parseFloat(document.getElementById('lm')?document.getElementById('lm').value:0)||0;
  var startEl=document.getElementById('lstartmo');
  var loanMoEl=document.getElementById('lloanmo');
  var preview=document.getElementById('loan-preview');
  if(!preview)return;
  if(total<=0||monthly<=0){preview.style.display='none';return;}
  var startMo=startEl?parseInt(startEl.value):0;
  var loanMo=loanMoEl?parseInt(loanMoEl.value):0;
  var months=Math.ceil(total/monthly);
  var lines=['<b>Repayment deductions from payroll:</b><br/>'];
  var remaining=total;
  for(var i=0;i<months;i++){
    var mo=(startMo+i)%12;
    var rep=Math.min(monthly,Math.round(remaining*100)/100);
    lines.push(MONTHS[mo]+' 2026: <b>E'+rep.toFixed(2)+'</b> advance deduction');
    remaining=Math.round((remaining-rep)*100)/100;
    if(remaining<=0)break;
  }
  lines.push('<br/><span style="color:#374151;">'+months+' month'+(months>1?'s':'')+' | Total: <b>E'+total.toFixed(2)+'</b></span>');
  preview.innerHTML=lines.join('<br/>');
  preview.style.display='block';
}
function clearLoan(empId,loanId){
  if(!confirm('Clear this loan from the tracker? This cannot be undone.'))return;
  var emp=G.emps.find(function(e){return e.id===empId;});
  emp.loans=emp.loans.filter(function(l){return l.id!==loanId;});
  G.log.push({ts:nowTs(),msg:'Loan cleared for '+emp.name});
  saveS();render();
}
function markLoanPaid(empId,loanId){
  var emp=G.emps.find(function(e){return e.id===empId;});
  var loan=emp.loans.find(function(l){return l.id===loanId;});
  if(!loan)return;
  loan.paid=loan.total;
  G.log.push({ts:nowTs(),msg:'Loan fully paid off for '+emp.name});
  saveS();render();
}
function openAddLoan(empId){
  G.modal={t:'addloan',empId:empId};render();
}
function saveAddLoan(){
  var empId=G.modal.empId;
  var emp=G.emps.find(function(e){return e.id===empId;});
  var desc=document.getElementById('ld').value.trim()||'Loan';
  var total=parseFloat(document.getElementById('lt').value)||0;
  var monthly=parseFloat(document.getElementById('lm').value)||0;
  var ldate=document.getElementById('ldate').value||new Date().toISOString().slice(0,10);
  var loanMo=parseInt(document.getElementById('lloanmo').value);
  var startMo=parseInt(document.getElementById('lstartmo').value);
  if(total<=0){alert('Enter a loan amount.');return;}
  if(monthly<=0){alert('Enter a monthly repayment amount.');return;}
  if(!emp.loans)emp.loans=[];
  if(!emp.advPerMonth)emp.advPerMonth={};
  var loanId=Date.now();
  var months=Math.ceil(total/monthly);
  /* Only write the monthly repayment deductions from startMo onwards.
     The loan month itself is NOT touched — the loan is a cash advance
     already given, not a payroll deduction on the month it is given. */
  var remaining=total;
  var schedule=[];
  for(var i=0;i<months;i++){
    var mo=(startMo+i)%12;
    var repayment=Math.min(monthly,Math.round(remaining*100)/100);
    emp.advPerMonth[mo]=(emp.advPerMonth[mo]||0)+repayment;
    schedule.push({mo:mo,amount:repayment});
    remaining=Math.round((remaining-repayment)*100)/100;
    if(remaining<=0)break;
  }
  emp.loans.push({id:loanId,desc:desc,total:total,paid:0,monthly:monthly,
    date:ldate,loanMo:loanMo,startMo:startMo,months:months,schedule:schedule});
  G.log.push({ts:nowTs(),msg:'Loan: '+emp.name+' — '+fE(total)+' given '+MONTHS[loanMo]+
    '. Repay '+fE(monthly)+'/mo x'+months+' from '+MONTHS[startMo]+'.'});
  G.modal=null;saveS();render();
}
function updateLoanPaid(empId,loanId){
  var emp=G.emps.find(function(e){return e.id===empId;});
  var loan=emp.loans.find(function(l){return l.id===loanId;});
  var inp=document.getElementById('lp'+loanId);
  if(!inp||!loan)return;
  var val=parseFloat(inp.value)||0;
  if(val<0||val>loan.total){alert('Amount must be between 0 and '+fE(loan.total));return;}
  loan.paid=val;
  G.log.push({ts:nowTs(),msg:'Loan balance updated for '+emp.name+': paid '+fE(val)+' of '+fE(loan.total)});
  saveS();render();
}
function togAct(id){
  var e=G.emps.find(function(x){return x.id===id;});e.active=!e.active;
  G.log.push({ts:nowTs(),msg:(e.active?'Reactivated':'Deactivated')+': '+e.name});
  saveS();render();
}
function openEdit(id){G.modal={t:'edit',e:JSON.parse(JSON.stringify(G.emps.find(function(x){return x.id===id;})))};render();}
function openAdd(){G.modal={t:'add',e:{name:'',sal:0,paye:0,enpf:0,adv:0,notes:'',col:'av-blue',active:true,loans:[],wn:[],ov:{},advPerMonth:{}}};render();}
function openVar(id){G.modal={t:'var',e:JSON.parse(JSON.stringify(G.emps.find(function(x){return x.id===id;})))};render();}
function closeMod(){G.modal=null;render();}
function openPS(id){G.sp=id;render();}
function closePS(){G.sp=null;render();}

function saveEdit(id){
  var i=G.emps.findIndex(function(x){return x.id===id;});var old=G.emps[i].name;var e=G.emps[i];
  e.name=document.getElementById('fn').value;
  e.sal=parseFloat(document.getElementById('fs').value)||0;
  e.paye=parseFloat(document.getElementById('fp').value)||0;
  e.enpf=parseFloat(document.getElementById('fe').value)||0;
  e.notes=document.getElementById('fn2').value;
  e.col=document.getElementById('fc').value;
  /* Only update advance if this month is NOT yet paid */
  if(!G.paid['a'+G.mo]){
    var advVal=parseFloat(document.getElementById('fa').value)||0;
    if(!e.advPerMonth)e.advPerMonth={};
    e.advPerMonth[G.mo]=advVal;
  }
  G.log.push({ts:nowTs(),msg:'Updated: '+old});G.modal=null;saveS();render();
}
function saveAdd(){
  var name=document.getElementById('fn').value.trim();if(!name)return;
  var ini=name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
  var advVal=parseFloat(document.getElementById('fa').value)||0;
  var advPerMonth={};advPerMonth[G.mo]=advVal;
  G.emps.push({id:G.nid++,name:name,ini:ini,col:document.getElementById('fc').value,
    sal:parseFloat(document.getElementById('fs').value)||0,
    paye:parseFloat(document.getElementById('fp').value)||0,
    enpf:parseFloat(document.getElementById('fe').value)||0,
    adv:0,notes:document.getElementById('fn2').value,
    active:true,loans:[],wn:[],ov:{},advPerMonth:advPerMonth});
  G.log.push({ts:nowTs(),msg:'Added: '+name});G.modal=null;saveS();render();
}
function saveVar(id){
  var e=G.emps.find(function(x){return x.id===id;});if(!e.ov)e.ov={};
  var v=document.getElementById('vv').value;var m=parseInt(document.getElementById('vm').value);
  if(v===''){delete e.ov[m];}else{e.ov[m]=parseFloat(v)||0;}
  G.log.push({ts:nowTs(),msg:'Variable wage: '+e.name+' '+MONTHS[m]+' '+(v?fE(v):'reset')});
  G.modal=null;saveS();render();
}

/* ── renderers ── */
function rDen(d){
  var h='';
  for(var i=0;i<DENOMS.length;i++){
    var v=DENOMS[i];if(!d[v])continue;
    var lbl=v>=1?'E'+v:'E'+v.toFixed(2);
    h+='<div class="'+(v>=5?'di':'dc')+'"><div class="dv">'+lbl+'</div><div class="'+(v>=5?'dn':'da')+'">x'+d[v]+'</div></div>';
  }
  return h;
}
function rHol(m){
  var hs=HOLS[m]||[];if(!hs.length)return'';
  return'<div class="hbanner"><b>Public holidays — '+MONTHS[m]+':</b> '+hs.map(function(h){return'<span class="hchip">'+h.d+' — '+h.n+'</span>';}).join('')+'</div>';
}
function rNotes(emp){
  var show=G.sn[emp.id];var notes=emp.wn||[];var cnt=notes.length;
  var h='<div class="ns"><div class="nh">';
  h+='<span style="font-size:12px;font-weight:600;color:#6b7280;">Wage notes'+(cnt?' <span class="badge" style="background:#dbeafe;color:#1e3a8a;">'+cnt+'</span>':'')+'</span>';
  h+='<span class="tl" onclick="togN('+emp.id+')">'+(show?'Hide':'Show')+' notes</span></div>';
  if(show){
    if(!notes.length){h+='<div style="font-size:12px;color:#9ca3af;font-style:italic;">No notes yet.</div>';}
    else{var rev=notes.slice().reverse();for(var i=0;i<rev.length;i++){var n=rev[i];h+='<div class="ne"><div class="nt">'+esc(n.text)+'</div><div class="nm"><span><span style="background:#dbeafe;color:#1e3a8a;font-size:11px;padding:1px 6px;border-radius:4px;">'+MONTHS[n.mo]+'</span> '+n.ts+'</span><button class="ndel" onclick="delNote('+emp.id+','+n.id+')">Delete</button></div></div>';}}
    h+='<div class="nir"><textarea class="nta" id="ni'+emp.id+'" rows="2" placeholder="Add note for '+MONTHS[G.mo]+'..."></textarea><button class="nab" onclick="addNote('+emp.id+')">Add</button></div>';
  }
  return h+'</div>';
}

function rCard(emp){
  var p=po(emp,G.mo),sal=es(emp,G.mo);
  var hasOv=emp.ov&&emp.ov[G.mo]!==undefined;
  var advVal=getAdv(emp,G.mo);
  var showD=G.sd[emp.id];
  var dn=den(p);
  var h='<div class="card"'+(emp.active?'':' style="opacity:0.5"')+'>';
  h+='<div class="eh"><div class="av '+emp.col+'">'+emp.ini+'</div>';
  h+='<div><div class="en">'+esc(emp.name)+(emp.active?'':' <span class="badge b-off">Inactive</span>')+'</div>';
  h+='<div class="es">Employee #'+emp.id+'</div></div>';
  h+='<div style="margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;">';
  h+='<button class="btn" onclick="openEdit('+emp.id+')">Edit</button>';
  h+='<button class="btn'+(emp.active?' btn-red':'')+'" onclick="togAct('+emp.id+')">'+(emp.active?'Deactivate':'Reactivate')+'</button>';
  h+='</div></div>';
  if(emp.active){
    h+='<div class="eg">';
    h+='<div class="estat"><div class="esl">Salary'+(hasOv?' <span class="vb">Override</span>':'')+'</div><div class="esv">'+fE(sal)+(hasOv?'<span style="font-size:10px;color:#6b7280;margin-left:3px;">base:'+fE(emp.sal)+'</span>':'')+'</div></div>';
    h+='<div class="estat"><div class="esl">PAYE <span style="font-size:9px;color:#9ca3af;">fixed</span></div><div class="esv" style="color:#a32d2d;">'+fE(emp.paye)+'</div></div>';
    h+='<div class="estat"><div class="esl">ENPF <span style="font-size:9px;color:#9ca3af;">fixed</span></div><div class="esv" style="color:#a32d2d;">'+fE(emp.enpf)+'</div></div>';
    var advLocked=!!G.paid['a'+G.mo];
    h+='<div class="estat"><div class="esl">Advance '
      +(advLocked
        ?'<span style="font-size:9px;background:#d1fae5;color:#065f46;padding:1px 5px;border-radius:4px;">locked</span>'
        :'<span class="reset-badge">resets monthly</span>')
      +'</div><div class="esv" style="color:#a32d2d;">'+fE(advVal)+'</div></div>';
    h+='</div>';
    if(emp.notes)h+='<div style="margin-bottom:7px;"><span style="background:#fef3c7;color:#78350f;font-size:11px;padding:2px 7px;border-radius:6px;">'+esc(emp.notes)+'</span></div>';
    h+='<div class="pr"><span style="font-size:12px;color:#6b7280;">Net payout — '+MONTHS[G.mo]+'</span><span class="pa">'+fE(p)+'</span></div>';
    h+='<div class="br">';
    h+='<span class="tl" onclick="togD('+emp.id+')">'+(showD?'Hide':'Show')+' denominations</span>';
    h+='<button class="btn btn-amber" onclick="openVar('+emp.id+')">Variable wage</button>';
    h+='<button class="btn btn-navy" onclick="openPS('+emp.id+')" style="margin-left:auto;">Print payslip</button>';
    h+='</div>';
    if(showD)h+='<div class="dg">'+rDen(dn)+'</div>';
    h+=rNotes(emp);
  } else {
    h+='<div style="font-size:12px;color:#9ca3af;">Deactivated — excluded from payroll.</div>';
  }
  return h+'</div>';
}

function rModal(){
  var m=G.modal;if(!m)return'';
  var COLS=['av-blue','av-teal','av-coral','av-purple'];
  if(m.t==='edit'||m.t==='add'){
    var e=m.e;
    var co=COLS.map(function(c){return'<option value="'+c+'"'+(e.col===c?' selected':'')+'>'+c.replace('av-','')+'</option>';}).join('');
    var advCurr=m.t==='edit'?getAdv(e,G.mo):(e.adv||0);
    return'<div class="mw"><div class="mo"><h2>'+(m.t==='add'?'Add employee':'Edit — '+esc(e.name))+'</h2>'
      +'<div class="fr"><label>Full name</label><input id="fn" value="'+esc(e.name||'')+'"/></div>'

      +'<div class="fr"><label>Description</label><input id="ld" placeholder="e.g. Loan March 2026"/></div>'
      +'<div class="fr"><label>Date loan was given</label><input id="ldate" type="date" value="'+new Date().toISOString().slice(0,10)+'"/></div>'
      +'<div class="fr"><label>Month loan appears on payroll <span style="font-size:10px;color:#78350f;">shows as full advance this month</span></label>'
      +'<select id="lloanmo">'
      +MONTHS.map(function(mn,i){return'<option value="'+i+'"'+(i===G.mo?' selected':'')+'>'+mn+' 2026</option>';}).join('')
      +'</select></div>'
      +'<div class="fr"><label>Total loan amount (E)</label><input id="lt" type="number" placeholder="0" oninput="updateLoanPreview()"/></div>'
      +'<div class="fr"><label>Monthly repayment (E)</label><input id="lm" type="number" placeholder="0" oninput="updateLoanPreview()"/></div>'
      +'<div class="fr"><label>First repayment month <span style="font-size:10px;color:#0f6e56;">deducted from advance each month</span></label>'
      +'<select id="lstartmo" onchange="updateLoanPreview()">'
      +MONTHS.map(function(mn,i){return'<option value="'+i+'"'+(i===(G.mo+1)%12?' selected':'')+'>'+mn+' 2026</option>';}).join('')
      +'</select></div>'
      +'<div id="loan-preview" style="background:#f0f9f6;border-radius:8px;padding:10px 12px;font-size:12px;color:#065f46;margin-bottom:8px;display:none;">'
      +'</div>'
      +'<div class="fa"><button class="bc" onclick="closeMod()">Cancel</button>'
      +'<button class="bs" onclick="saveAddLoan()">Add loan</button></div>'
      +'</div></div>';
  }
  if(G.modal&&G.modal.t==='set'){
    var setView=G.modal.sub||'main';
    if(setView==='pin'){
      h+='<div class="mw"><div class="mo"><h2>Change PIN</h2>'
        +'<div class="fr"><label>Current PIN</label><input id="pc" type="password" maxlength="4" placeholder="Current PIN"/></div>'
        +'<div class="fr"><label>New PIN (4 digits)</label><input id="pn1" type="password" maxlength="4" placeholder="New PIN"/></div>'
        +'<div class="fr"><label>Confirm new PIN</label><input id="pn2" type="password" maxlength="4" placeholder="Confirm PIN"/></div>'
        +'<div class="fa"><button class="bc" onclick="goSetMain()">Back</button><button class="bs" onclick="saveNewPin()">Update PIN</button></div>'
        +'</div></div>';
    } else {
      h+='<div class="mw"><div class="mo"><h2>Settings</h2>'
        +'<div style="padding:12px;background:#f8f9fa;border-radius:8px;font-size:12px;color:#6b7280;margin-bottom:12px;">'
        +'<b>Fixed monthly:</b> Salary, PAYE, ENPF carry over unchanged.<br/>'
        +'<b>Resets monthly:</b> Advance starts at E0 each new month.<br/>'
        +'<b>Session:</b> Auto-locks after 5 min inactivity.</div>'
        +'<button class="btn" onclick="goSetPin()" style="width:100%;margin-bottom:8px;">Change PIN</button>'
        +'<div class="fa"><button class="bs" onclick="closeMod()">Close</button></div>'
        +'</div></div>';
    }
  } else if(G.modal){
    h+=rModal();
  }

  if(G.sp!==null)h+=rPayslip();
  h+='</div>';
  root.innerHTML=h;
}

/* Capture install prompt */
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  /* Show install button if visible */
  var btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'block';
});
window.addEventListener('appinstalled', function(){
  deferredPrompt = null;
  var btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'none';
});
function installApp(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
}
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}

/* Warn before refresh/close to prevent accidental data loss */
window.addEventListener('beforeunload',function(e){
  var msg='Are you sure you want to refresh? Any unsaved changes may be lost.';
  e.preventDefault();
  e.returnValue=msg;
  return msg;
});
render();
</script>
