/* Dark mode: the app's colors are hardcoded inline throughout rather than
   centralized, so a real per-element dark theme would need to touch nearly
   every style="" attribute in the file -- high risk of missed spots and
   half-broken theming. Inverting the whole page's colors is a safe,
   consistent alternative that requires no changes to existing styles.
   The PIN lock screen is already dark by design, so it gets a second
   invert to cancel the page-level one out and stay looking the way it
   always has, regardless of the dark-mode toggle. One honest trade-off:
   logo images elsewhere in the app will appear color-inverted in dark
   mode, since there's no reliable way to selectively counter-invert just
   those without risking the lock-screen logo breaking instead. */
html.dark-mode{filter:invert(1) hue-rotate(180deg);background:#fff;}
/* In-app alert/confirm dialogs -- replaces the browser's native grey

/* Mobile specific styles */

.m-pin-dot.filled { background: #6366f1; border-color: #6366f1; transform: scale(1.1); }
.m-pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
.m-pin-btn { width: 72px; height: 72px; border-radius: 50%; border: 1.5px solid #e2e8f0; background: #fff; font-size: 22px; font-weight: 700; cursor: pointer; color: #0f172a; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.1s; font-family: inherit; }
.m-pin-btn:active { transform: scale(0.94); background: #f1f5f9; }
.m-pin-err { font-size: 13px; color: #ef4444; font-weight: 600; }

/* Fade animation */
@keyframes mFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.m-fade { animation: mFadeIn 0.25s ease-out; }
.desktop-app { animation: mFadeIn 0.2s ease-out; }

/* YTD mobile table */
.m-ytd-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; }
.m-ytd-month { font-size: 13px; font-weight: 600; color: #334155; }
.m-ytd-total { font-size: 13px; font-weight: 700; color: #6366f1; }


.m-wrap{max-width:430px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:80px;}

function syncToCloud(cb){
  if(!navigator.onLine){syncStatus='offline';renderSyncBadge();if(cb)cb(false);return;}
  syncStatus='saving';renderSyncBadge();
  fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({token:SYNC_TOKEN,emps:G.emps,paid:G.paid,prepared:G.prepared,log:G.log,mo:G.mo,updatedAt:G.updatedAt})})
    .then(function(r){return r.text();})
    .then(function(t){
      var ok=t.trim()==='OK';
      syncStatus=ok?'saved':'error';renderSyncBadge();
      if(ok)lastSyncedUpdatedAt=G.updatedAt;
      if(cb)cb(ok);
    })
    .catch(function(){syncStatus='error';renderSyncBadge();if(cb)cb(false);});
}
function loadFromCloud(cb){
  if(!navigator.onLine){if(cb)cb(false);return;}
  syncStatus='loading';renderSyncBadge();
  fetch(SHEETS_URL+'?t='+Date.now()+'&token='+encodeURIComponent(SYNC_TOKEN))
    .then(function(r){return r.text();})
    .then(function(t){
      if(!t||t==='{}'||t.trim()===''){syncStatus='saved';renderSyncBadge();if(cb)cb(false);return;}
      var d=JSON.parse(t);
      if(d&&d.emps&&d.emps.length){
        var remoteTs=d.updatedAt||0;
        var localHasUnsyncedEdits=G.updatedAt>lastSyncedUpdatedAt;
        var remoteIsNewerThanLocal=remoteTs>G.updatedAt;
        function applyRemoteData(){
          G.emps=d.emps;if(d.paid)G.paid=d.paid;if(d.prepared)G.prepared=d.prepared;if(d.log)G.log=d.log;if(d.mo!==undefined)G.mo=d.mo;
          G.updatedAt=remoteTs||Date.now();
          lastSyncedUpdatedAt=G.updatedAt;
          migrateEmpFields();
          try{localStorage.setItem(SK,JSON.stringify({emps:G.emps,paid:G.paid,prepared:G.prepared,log:G.log,mo:G.mo,updatedAt:G.updatedAt}));localSaveFailed=false;}
          catch(e){localSaveFailed=true;}
          syncStatus='saved';renderSyncBadge();if(cb)cb(true);
        }
        if(localHasUnsyncedEdits&&remoteIsNewerThanLocal){
          showConfirm('This device has unsaved local changes, and the cloud copy is newer than what you last synced.\n\nPress OK to load the cloud version (your local changes will be discarded).\nPress Cancel to keep this device\'s version -- use "Force sync now" afterwards to push it to the cloud.',
            applyRemoteData,
            function(){syncStatus='saved';renderSyncBadge();if(cb)cb(false);}
          );
        }else{
          applyRemoteData();
        }
      }else{syncStatus='saved';renderSyncBadge();if(cb)cb(false);}
    }).catch(function(){syncStatus='error';renderSyncBadge();if(cb)cb(false);});
}

/* ======================================================================

   ====================================================================== */
var sortCol=null,sortDir=1;
function sortBy(col){
  if(sortCol===col)sortDir*=-1;
  else{sortCol=col;sortDir=1;}
  render();
}
function getSortedEmps(){
  var emps=G.emps.slice();
  if(!sortCol)return emps;
  emps.sort(function(a,b){
    var av,bv;
    if(sortCol==='name'){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
    else if(sortCol==='payout'){av=po(a,G.mo);bv=po(b,G.mo);}
    else if(sortCol==='salary'){av=es(a,G.mo);bv=es(b,G.mo);}
    if(av<bv)return -1*sortDir;
    if(av>bv)return 1*sortDir;
    return 0;
  });
  return emps;
}

function exportBackup(){
  var data={
    version:1,
    exported:nowTs(),
    emps:G.emps,
    paid:G.paid,
    log:G.log,
    mo:G.mo
  };
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var date=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download='vakasha-lodge-wages-backup-'+date+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  G.log.push({ts:nowTs(),msg:'Data backup exported.'});
  saveS();
}

function importBackup(){
  var input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.emps||!Array.isArray(data.emps)){
          showAlert('Invalid backup file.');return;
        }
        showConfirm('Replace ALL current data with this backup from '+(data.exported||'unknown date')+'? This cannot be undone.',function(){
          G.emps=data.emps;
          G.paid=data.paid||{};
          G.log=data.log||[];
          G.mo=data.mo!==undefined?data.mo:G.mo;
          migrateEmpFields();
          G.log.push({ts:nowTs(),msg:'Data restored from backup ('+( data.exported||'unknown')+').'});
          saveS();
          syncToCloud();
          render();
          showAlert('Backup restored successfully.');
        });
      }catch(err){
        showAlert('Failed to read backup file: '+err.message);
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
}

function getPIN(){return localStorage.getItem('genlec_pin')||'1234';}
function getOwnerPIN(){return localStorage.getItem('genlec_owner_pin')||null;}

function authOK(role){
  G.authed=true;G.role=role||'owner';pinEntry='';pinAttempts=0;pinLocked=false;lastActive=Date.now();haptic([30,20,30]);render();
  if(navigator.onLine)loadFromCloud(function(ok){if(ok)render();});
}
function tryPIN(d){
  if(pinLocked&&Date.now()<pinLockUntil){render();return;}
  if(d==='del'){pinEntry=pinEntry.slice(0,-1);render();return;}
  pinEntry+=d;render();
  if(pinEntry.length===4){
    var ownerPin=getOwnerPIN();
    if(pinEntry===getPIN()){
      /* If a distinct owner PIN has been set, the general PIN is preparer-only.
         If no owner PIN has ever been configured, the single PIN keeps full
         owner access -- this is what makes the feature backward-compatible
         with every existing installation. */
      authOK(ownerPin?'preparer':'owner');
    }else if(ownerPin&&pinEntry===ownerPin){
      authOK('owner');
    }else{
      pinAttempts++;
      if(pinAttempts>=3){pinLocked=true;pinLockUntil=Date.now()+300000;pinEntry='';render();}
      else{haptic(100);setTimeout(function(){pinEntry='';render();},600);}
    }
  }
}

/* ── Biometric unlock (WebAuthn, platform authenticator) ──
   This is a LOCAL, single-device convenience unlock, not a server-verified
   login. It still requires the device's real Face ID / Touch ID / fingerprint
   / Windows Hello check to succeed before it will unlock -- the browser and
   OS enforce that -- but there's no server checking the cryptographic
   signature, since this app has no traditional backend. Treat it the same
   as the PIN: convenient for a personal or trusted device, not a substitute
   for keeping the underlying data itself secured (see SYNC_TOKEN notes). */
var BIO_KEY='genlec_webauthn_cred';
function biometricEnabled(){return !!localStorage.getItem(BIO_KEY);}
function biometricSupported(){return !!(window.PublicKeyCredential&&navigator.credentials&&navigator.credentials.create);}
function randBuf(len){var a=new Uint8Array(len);crypto.getRandomValues(a);return a;}
function bufToB64u(buf){var bin='';var bytes=new Uint8Array(buf);for(var i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function b64uToBuf(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';var bin=atob(s);var buf=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf;}
function enableBiometric(){
  if(!biometricSupported()){showAlert('Biometric unlock is not supported on this browser or device.');return;}
  navigator.credentials.create({publicKey:{
    challenge:randBuf(32),
    rp:{name:'Vakasha Lodge Wages'},
    user:{id:randBuf(16),name:'vakasha-device',displayName:'Vakasha Lodge Wages'},
    pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
    authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
    timeout:60000
  }}).then(function(cred){
    localStorage.setItem(BIO_KEY,bufToB64u(cred.rawId));
    showAlert('Biometric unlock enabled on this device.');
    render();
  }).catch(function(err){
    showAlert('Could not enable biometric unlock: '+(err&&err.message?err.message:'cancelled or unsupported on this device.'));
  });
}
function disableBiometric(){
  localStorage.removeItem(BIO_KEY);
  render();
}
function unlockWithBiometric(){
  var credId=localStorage.getItem(BIO_KEY);
  if(!credId)return;
  navigator.credentials.get({publicKey:{
    challenge:randBuf(32),
    allowCredentials:[{id:b64uToBuf(credId),type:'public-key'}],
    userVerification:'required',
    timeout:60000
  }}).then(function(assertion){
    if(assertion)authOK('owner');
  }).catch(function(){/* cancelled or failed -- user still has the PIN pad on screen */});
}

   attempts a real file download too. */
function autoBackupAfterPay(paidMo){
  try{
    var snapshot={emps:G.emps,paid:G.paid,prepared:G.prepared,log:G.log,mo:paidMo,year:CY,timestamp:nowTs()};
    localStorage.setItem('genlec_snapshot_'+CY+'_'+paidMo,JSON.stringify(snapshot));
  }catch(e){/* snapshot best-effort; download attempt below still runs */}
  try{
    var blob=new Blob([JSON.stringify({emps:G.emps,paid:G.paid,prepared:G.prepared,log:G.log,mo:paidMo},null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='vakasha-backup-'+MONTHS[paidMo]+'-'+CY+'-paid.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }catch(e){/* download best-effort; snapshot above still ran */}
}

/* ── Custom alert/confirm, styled to match the rest of the app instead of
   the browser's native grey popup. Native alert()/confirm() are
   synchronous and block the whole page; these are async (they render a
   modal and call back once the person responds), so every former call
   site had to be restructured slightly -- the logic that used to run
   "after confirm()" now runs inside the onYes callback instead. ── */
function showAlert(message,onClose){
  G._alertBox={message:message,onClose:onClose||null};
  render();
}
function closeAlertBox(){
  var cb=G._alertBox&&G._alertBox.onClose;
  G._alertBox=null;
  render();
  if(cb)cb();
}
function showConfirm(message,onYes,onNo){
  G._confirmBox={message:message,onYes:onYes||null,onNo:onNo||null};
  render();
}
function resolveConfirmBox(yes){
  var box=G._confirmBox;
  G._confirmBox=null;
  render();
  if(!box)return;
  if(yes&&box.onYes)box.onYes();
  else if(!yes&&box.onNo)box.onNo();
}
function renderSystemDialogs(){
  var h='';
  if(G._alertBox){
    h+='<div class="sysdlg-backdrop" onclick="closeAlertBox()"><div class="sysdlg" onclick="event.stopPropagation()">'
      +'<div class="sysdlg-msg">'+esc(G._alertBox.message).replace(/\n/g,'<br/>')+'</div>'
      +'<div class="sysdlg-actions"><button class="sysdlg-btn sysdlg-primary" onclick="closeAlertBox()" autofocus>OK</button></div>'
      +'</div></div>';
  }
  if(G._confirmBox){
    h+='<div class="sysdlg-backdrop" onclick="resolveConfirmBox(false)"><div class="sysdlg" onclick="event.stopPropagation()">'
      +'<div class="sysdlg-msg">'+esc(G._confirmBox.message).replace(/\n/g,'<br/>')+'</div>'
      +'<div class="sysdlg-actions"><button class="sysdlg-btn" onclick="resolveConfirmBox(false)">Cancel</button><button class="sysdlg-btn sysdlg-primary" onclick="resolveConfirmBox(true)">OK</button></div>'

function updateAdvPreview(){
  var tot=parseFloat(document.getElementById('fa')?document.getElementById('fa').value:0)||0;
  var inst=parseFloat(document.getElementById('fa-install')?document.getElementById('fa-install').value:0)||0;
  var prev=document.getElementById('adv-preview');
  var typeEl=document.getElementById('fa-type');
  var startMoEl=document.getElementById('fa-startmo');
  if(!prev||!typeEl)return;
  if(typeEl.value!=='installment'||tot<=0){prev.style.display='none';return;}
  if(inst<=0||inst>tot)inst=tot;
  var startMo=startMoEl?parseInt(startMoEl.value):G.mo;
  var months=Math.ceil(tot/inst),lines=[],rem=tot;
  for(var i=0;i<months;i++){
    var mo=(startMo+i)%12;
    var rep=Math.round(Math.min(inst,rem)*100)/100;
    lines.push(MONTHS[mo]+': <b>'+fE(rep)+'</b>');
    rem=Math.round((rem-rep)*100)/100;
    if(rem<=0)break;
  }
  prev.innerHTML='<b>Schedule ('+months+' month'+(months>1?'s':'')+')</b><br/>'+lines.join('<br/>');
  prev.style.display='block';
}

function drawRoundedRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function payslipRowData(emp){
  var sal=es(emp,G.mo);var hol=getHol(emp,G.mo);var otAmt=getOTAmount(emp,G.mo);var allowTot=getAllowancesTotal(emp);var adv=getAdv(emp,G.mo);var dedTot=getDeductionsTotal(emp);var p=po(emp,G.mo);
  var rows=[{label:'Gross salary',value:fE(sal),color:'#0f172a'}];
  if(hol>0)rows.push({label:'Holiday pay',value:'+ '+fE(hol),color:'#16a34a'});
  if(otAmt>0)rows.push({label:'Overtime',value:'+ '+fE(otAmt),color:'#16a34a'});
  if(allowTot>0)(emp.allowances||[]).filter(function(d){return d.active;}).forEach(function(d){rows.push({label:d.label,value:'+ '+fE(d.amount),color:'#16a34a'});});
  rows.push({label:'PAYE',value:'- '+fE(emp.paye),color:'#dc2626'});
  rows.push({label:'ENPF',value:'- '+fE(emp.enpf),color:'#dc2626'});
  if(adv>0)rows.push({label:'Advance',value:'- '+fE(adv),color:'#dc2626'});
  if(dedTot>0)(emp.deductions||[]).filter(function(d){return d.active;}).forEach(function(d){rows.push({label:d.label,value:'- '+fE(d.amount),color:'#dc2626'});});
  return{rows:rows,net:p};
}
function generatePayslipCanvas(emp,cb){
  var data=payslipRowData(emp);
  var W=680,padX=36,rowH=40,scale=2;
  var headerH=118,nameH=52,footerH=76;
  var H=headerH+nameH+data.rows.length*rowH+footerH;
  var canvas=document.createElement('canvas');
  canvas.width=W*scale;canvas.height=H*scale;
  var ctx=canvas.getContext('2d');
  ctx.scale(scale,scale);
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#e5e7eb';ctx.lineWidth=1.5;
  drawRoundedRectPath(ctx,6,6,W-12,H-12,14);ctx.stroke();
  function draw(logoImg){
    var textX=padX;
    if(logoImg){ctx.drawImage(logoImg,padX,26,52,52);textX=padX+66;}
    ctx.fillStyle='#0f172a';ctx.font='bold 21px system-ui,-apple-system,sans-serif';ctx.textAlign='left';
    ctx.fillText('Vakasha Lodge',textX,50);
    ctx.fillStyle='#94a3b8';ctx.font='13px system-ui,-apple-system,sans-serif';
    ctx.fillText('Payslip - '+MONTHS[G.mo]+' '+CY,textX,70);
    ctx.strokeStyle='#f1f5f9';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(padX,headerH-8);ctx.lineTo(W-padX,headerH-8);ctx.stroke();
    ctx.fillStyle='#0f172a';ctx.textAlign='left';
    var nameSize=19;var nameMaxW=W-padX*2;
    ctx.font='bold '+nameSize+'px system-ui,-apple-system,sans-serif';
    while(ctx.measureText(emp.name).width>nameMaxW&&nameSize>12){nameSize--;ctx.font='bold '+nameSize+'px system-ui,-apple-system,sans-serif';}
    ctx.fillText(emp.name,padX,headerH+24);
    var ry=headerH+nameH+22;
    data.rows.forEach(function(r){
      ctx.fillStyle='#6b7280';ctx.font='15px system-ui,-apple-system,sans-serif';ctx.textAlign='left';
      ctx.fillText(r.label,padX,ry);
      ctx.fillStyle=r.color;ctx.font='600 15px system-ui,-apple-system,sans-serif';ctx.textAlign='right';
      ctx.fillText(r.value,W-padX,ry);
      ry+=rowH;
    });
    ctx.strokeStyle='#f1f5f9';
    ctx.beginPath();ctx.moveTo(padX,ry-rowH+12);ctx.lineTo(W-padX,ry-rowH+12);ctx.stroke();
    ctx.fillStyle='#0f172a';ctx.font='bold 17px system-ui,-apple-system,sans-serif';ctx.textAlign='left';
    ctx.fillText('Net payout',padX,ry+14);
    ctx.fillStyle='#059669';ctx.font='bold 25px system-ui,-apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(fE(data.net),W-padX,ry+18);
    cb(canvas);
  }
  var logoSrc=window.LOGO_DATA;
  if(logoSrc){
    var img=new Image();
    img.onload=function(){draw(img);};
    img.onerror=function(){draw(null);};
    img.src=logoSrc;
  }else{draw(null);}
}
function downloadBlobFile(blob,filename){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}
function sharePayslipImage(empId){
  var emp=G.emps.find(function(x){return x.id===empId;});if(!emp)return;
  generatePayslipCanvas(emp,function(canvas){
    canvas.toBlob(function(blob){
      if(!blob){showAlert('Could not generate the payslip image on this device.');return;}
      var filename='payslip-'+emp.name.replace(/\s+/g,'-')+'-'+MONTHS[G.mo]+'-'+CY+'.png';
      var file;
      try{file=new File([blob],filename,{type:'image/png'});}catch(e){file=null;}
      if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'Payslip - '+emp.name}).catch(function(){/* user cancelled */});
      }else{
        downloadBlobFile(blob,filename);
        showAlert('This browser can\'t hand an image straight to an app from here, so the payslip image has been downloaded instead - attach it to WhatsApp (or anywhere else) manually from your downloads/photos.');
      }
    },'image/png');
  });
}

/* ======================================================================
   MAIN RENDER DISPATCH
   (decides desktop vs. mobile layout on every state change)
   ====================================================================== */
function render(){
  /* The whole UI is rebuilt from scratch (innerHTML) on every state change,
     which is simple and reliable but has one real cost: if the user is
     mid-keystroke in a text input (like the search boxes) when a re-render
     happens, the browser treats the rebuilt input as a brand-new element,
     drops focus, and -- critically on mobile -- dismisses the on-screen
     keyboard, forcing a re-tap for every single letter typed. This captures
     the focused field (by id) and its cursor position before rebuilding,
     then restores both afterwards so typing feels continuous. */
  var root=document.getElementById('root');
  var active=document.activeElement;
  var focusId=null,selStart=null,selEnd=null;
  if(active&&root&&root.contains(active)&&active.id&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA')){
    focusId=active.id;
    try{selStart=active.selectionStart;selEnd=active.selectionEnd;}catch(e){}
  }
  if(isMobile()){
    renderMobile();
  } else {
    renderDesktop();
  }
  if(focusId){
    var el=document.getElementById(focusId);
    if(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA')){
      el.focus();
      if(selStart!==null&&el.setSelectionRange){
        try{el.setSelectionRange(selStart,selEnd);}catch(e){}
      }
    }
  }
}

/* ======================================================================
   MOBILE: PAYSLIP MODAL
   ====================================================================== */
function rPayslipMobile(){
  var e=G.sp===null?null:G.emps.find(function(x){return x.id===G.sp;});
  var emps=e?[e]:G.emps.filter(function(x){return x.active;});
  var LOGO=window.LOGO_DATA||'';
  var h='<div class="m-modal-bg"><div class="m-modal"><div class="m-modal-handle"></div>';
  emps.forEach(function(emp){
    var p=po(emp,G.mo);var d=den(p);var sal=es(emp,G.mo);var adv=getAdv(emp,G.mo);
    h+='<div style="border:1px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:12px;">';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;">';
    if(LOGO)h+='<img src="'+LOGO+'" style="height:28px;width:auto;"/>';
    h+='<div><div style="font-weight:800;font-size:14px;color:#0f172a;">Vakasha Lodge</div><div style="font-size:11px;color:#94a3b8;">Payslip - '+MONTHS[G.mo]+' '+CY+'</div></div></div>';
    h+='<div style="font-weight:700;font-size:15px;color:#0f172a;margin-bottom:10px;">'+esc(emp.name)+'</div>';
    var rows=[['Gross salary',fE(sal),false],['PAYE',fE(emp.paye),true],['ENPF',fE(emp.enpf),true]];
    if(adv>0)rows.push(['Advance',fE(adv),true]);
    rows.forEach(function(r){
      h+='<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;">'
        +'<span style="color:#64748b;">'+r[0]+'</span>'
        +'<span style="font-weight:600;color:'+(r[2]?'#dc2626':'#334155')+';">'+(r[2]?'- ':'')+r[1]+'</span>'
        +'</div>';
    });
    h+='<div style="display:flex;justify-content:space-between;padding:10px 0 4px;border-top:1px solid #f1f5f9;margin-top:6px;">'
      +'<span style="font-weight:800;color:#0f172a;">Net payout</span>'
      +'<span style="font-weight:800;font-size:18px;color:#6366f1;">'+fE(p)+'</span></div>';
    var denomItems=DENOMS.filter(function(dn){return d[dn]>0;});
    if(denomItems.length){
      h+='<div style="margin-top:10px;"><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">Denominations</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px;">';
      denomItems.forEach(function(dn){h+='<span style="background:#f5f3ff;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;color:#6366f1;">'+(dn>=1?'E'+dn:'E'+dn.toFixed(2))+' x '+d[dn]+'</span>';});
      h+='</div></div>';
    }
    h+='</div>';
  });
  h+='<button onclick="printPayslip()" style="width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;">Print payslip</button>'
    +'<button onclick="G.sp=null;render();" style="width:100%;padding:13px;background:#f1f5f9;color:#64748b;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Close</button>';
  return h+'</div></div>';
}

var resizeTimer=null;
var undoStack=null; /* {action, data, empId, label} */
var undoTimer=null;

/* ======================================================================
   UNDO TOAST, TOUCH GESTURES & MISC UTILITIES
   (swipe-to-reveal on mobile cards, modal drag-to-close, undo banner)
   ====================================================================== */
function pushUndo(label, restoreFn){
  undoStack={label:label, restore:restoreFn};
  clearTimeout(undoTimer);
  undoTimer=setTimeout(function(){undoStack=null;renderUndoToast();},5000);
  renderUndoToast();
}

function doUndo(){
  if(!undoStack)return;
  undoStack.restore();
  clearTimeout(undoTimer);
  undoStack=null;
  saveS();render();
}

function renderUndoToast(){
  var toast=document.getElementById('undo-toast');
  if(!toast)return;
  if(!undoStack){toast.style.display='none';return;}
  toast.style.display='flex';
  var msg=document.getElementById('undo-msg');
  if(msg)msg.textContent=undoStack.label;
}
/* Pull-to-refresh */
var ptrStart=0,ptrActive=false;

/* Swipe-to-dismiss modals */
var modalSwipeStartY=0,modalSwipeEl=null;
function onModalTouchStart(e){
  modalSwipeStartY=e.touches[0].clientY;
  modalSwipeEl=e.currentTarget;
}
function onModalTouchMove(e){
  if(!modalSwipeEl)return;
  var dy=e.touches[0].clientY-modalSwipeStartY;
  if(dy>0){
    modalSwipeEl.style.transform='translateY('+Math.min(dy*0.4,80)+'px)';
    modalSwipeEl.style.transition='none';
  }
}
function onModalTouchEnd(e){
  if(!modalSwipeEl)return;
  var dy=e.changedTouches[0].clientY-modalSwipeStartY;
  if(dy>80){
    /* Swipe down far enough — dismiss */
    modalSwipeEl.style.transform='translateY(100%)';
    modalSwipeEl.style.transition='transform 0.25s ease';
    setTimeout(function(){closeMod();modalSwipeEl=null;},220);
  }else{
    /* Snap back */
    modalSwipeEl.style.transform='';
    modalSwipeEl.style.transition='transform 0.2s ease';
    setTimeout(function(){if(modalSwipeEl)modalSwipeEl.style.transition='';},200);
    modalSwipeEl=null;
  }
}

/* Swipe-to-edit on mobile cards */
var swipeStartX=0,swipeStartY=0,swipeEmpId=null;
function onCardTouchStart(e,empId){
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
  swipeEmpId=empId;
}
function onCardTouchEnd(e,empId){
  var dx=e.changedTouches[0].clientX-swipeStartX;
  var dy=Math.abs(e.changedTouches[0].clientY-swipeStartY);
  if(dx<-60&&dy<30&&swipeEmpId===empId){
    /* Swipe left detected - open edit */
    haptic(30);
    openEdit(empId);
  }
  swipeEmpId=null;
}
document.addEventListener('touchstart',function(e){
  if(window.scrollY===0&&isMobile())ptrStart=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  if(ptrActive&&isMobile()){
    ptrActive=false;
    var ind=document.getElementById('ptr-indicator');
    if(ind)ind.style.display='none';
    if(G.authed&&navigator.onLine){
      haptic(40);
      loadFromCloud(function(ok){if(ok)render();});
    }
  }
  ptrStart=0;
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(ptrStart>0&&isMobile()&&window.scrollY===0){
    var delta=e.touches[0].clientY-ptrStart;
    if(delta>60){
      ptrActive=true;
      var ind=document.getElementById('ptr-indicator');
      if(ind)ind.style.display='flex';
    }
  }
},{passive:true});

var lastWidth=window.innerWidth;
window.addEventListener('resize',function(){
  var newWidth=window.innerWidth;
  if(newWidth===lastWidth)return; /* height-only change = keyboard open/close, skip */
  lastWidth=newWidth;
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){render();},150);
});

document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();if(G.authed)saveNow();}});
function pushHistory(){try{history.pushState({page:'app'},'','');}catch(e){}}
pushHistory();
window.addEventListener('popstate',function(){
  pushHistory();
  if(G.sp!==null){G.sp=null;render();return;}
  if(G.modal){G.modal=null;render();return;}
  if(G.profile!==null){G.profile=null;render();return;}
  if(!G.authed)return;
  if(G.tab!=='monthly'){G.tab='monthly';render();return;}
  showConfirm('Leave Vakasha Lodge Wages?\n\nYour data is saved automatically.',function(){
    history.go(-2);
  });
});
window.addEventListener('load',function(){
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
  updateOfflineBanner();
  if(navigator.onLine)loadFromCloud(function(ok){if(ok)render();});
});
window.addEventListener('beforeunload',function(e){e.preventDefault();e.returnValue='';return '';});
render();
